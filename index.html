<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charuka Silva | Creative Director</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=300">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>

    <!-- Grain Overlay -->
    <div class="grain"></div>

    <!-- Floating Nav -->
    <nav class="nav" id="nav">
        <span class="nav-logo">CHARUKA.</span>
        <div class="nav-links">
            <a href="#work">Work</a>
            <a href="#reels">Reels</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <main>
        <!-- ===== HERO ===== -->
        <section class="hero">
            <div class="hero-glow"></div>
            <div class="hero-text">
                <h1 class="hero-line" id="h1">CHARUKA</h1>
                <h1 class="hero-line hero-outline" id="h2">SILVA</h1>
            </div>
            <div class="hero-avatar" id="hero-avatar">
                <img src="assets/avatar_clean.png" alt="Charuka Silva">
            </div>
            <div class="hero-bottom" id="hero-bottom">
                <p class="hero-role">Digital Marketer & Video Producer</p>
                <p class="hero-tagline">5+ Brands · 2M+ Reach · 4X ROAS</p>
            </div>
            <div class="scroll-indicator" id="scroll-ind">
                <div class="scroll-dot"></div>
            </div>
        </section>

        <!-- ===== POSTS SLIDESHOW ===== -->
        <section class="slideshow-section" id="work">
            <div class="slideshow-header">
                <p class="eyebrow fade-in">Social Campaigns</p>
                <h2 class="headline fade-in">Work that speaks.</h2>
            </div>
            <div class="slideshow" id="slideshow">
                <div class="slideshow-viewport">
                    <div class="slide active"><img src="assets/new_posts/post_ramadan.jpg" alt="Ramadan"></div>
                    <div class="slide"><img src="assets/new_posts/post_kiribath.jpg" alt="Kiribath"></div>
                    <div class="slide"><img src="assets/new_posts/post_mosquito_red.jpg" alt="Mosquito Net"></div>
                    <div class="slide"><img src="assets/new_posts/post_puja_yellow.jpg" alt="Puja Yellow"></div>
                    <div class="slide"><img src="assets/new_posts/post_puja_night.jpg" alt="Puja Night"></div>
                    <div class="slide"><img src="assets/pooja/post_pooja_net.jpg" alt="Pooja Net"></div>
                    <div class="slide"><img src="assets/pooja/post_pooja_monk.jpg" alt="Monk"></div>
                    <div class="slide"><img src="assets/pooja/post_pooja_offerings.jpg" alt="Offerings"></div>
                    <div class="slide"><img src="assets/garage/IMG_2461.JPG" alt="Prado"></div>
                    <div class="slide"><img src="assets/garage/IMG_2573_2.PNG" alt="Install"></div>
                    <div class="slide"><img src="assets/rainflow/Rainflow.JPG" alt="Rainflow"></div>
                    <div class="slide"><img src="assets/garage/IMG_2736_2.PNG" alt="Under Guard"></div>
                    <div class="slide"><img src="assets/rainflow/IMG_2464.JPG" alt="Rainflow Print"></div>
                    <div class="slide"><img src="assets/pooja/post_pooja_net_detail.jpg" alt="Net Detail"></div>
                </div>
                <div class="slideshow-progress" id="slideshow-progress"></div>
                <button class="slide-btn slide-prev" id="slide-prev"><i class="fa-solid fa-chevron-left"></i></button>
                <button class="slide-btn slide-next" id="slide-next"><i class="fa-solid fa-chevron-right"></i></button>
                <div class="slide-counter"><span id="slide-current">1</span> / <span id="slide-total">14</span></div>
            </div>
        </section>

        <!-- ===== REELS: Vertical immersive feed ===== -->
        <section class="reels-section" id="reels">
            <div class="reels-header">
                <p class="eyebrow fade-in">Cinematic Reels</p>
                <h2 class="headline fade-in">Motion that moves.</h2>
            </div>
            <div class="reels-feed">
                <div class="reel-full fade-in">
                    <video loop muted playsinline preload="metadata" class="reel-vid">
                        <source src="assets/pooja/v1c044g50000d6qhduvog65u01o7vcag.MP4" type="video/mp4">
                    </video>
                    <div class="reel-play-overlay"><i class="fa-solid fa-play"></i></div>
                </div>
                <div class="reel-full reel-full-wide fade-in">
                    <video loop muted playsinline preload="metadata" class="reel-vid">
                        <source src="assets/rainflow/Rainflow_commercial_intro.mp4" type="video/mp4">
                    </video>
                    <div class="reel-play-overlay"><i class="fa-solid fa-play"></i></div>
                </div>
                <div class="reel-full fade-in">
                    <video loop muted playsinline preload="metadata" class="reel-vid">
                        <source src="assets/pooja/v1c044g50000d6uik0vog65qck8t9rk0.MP4" type="video/mp4">
                    </video>
                    <div class="reel-play-overlay"><i class="fa-solid fa-play"></i></div>
                </div>
                <div class="reel-full reel-full-wide fade-in">
                    <video loop muted playsinline preload="metadata" class="reel-vid">
                        <source src="assets/garage/Garage_eka_rat_guard_video_.mov">
                    </video>
                    <div class="reel-play-overlay"><i class="fa-solid fa-play"></i></div>
                </div>
                <div class="reel-full fade-in">
                    <video loop muted playsinline preload="metadata" class="reel-vid">
                        <source src="assets/pooja/v14044g50000d60u6mvog65thvfbdva0.MP4" type="video/mp4">
                    </video>
                    <div class="reel-play-overlay"><i class="fa-solid fa-play"></i></div>
                </div>
                <div class="reel-full reel-full-wide fade-in">
                    <video loop muted playsinline preload="metadata" class="reel-vid">
                        <source src="assets/garage/Garage_eka_under_guard_video_.mov">
                    </video>
                    <div class="reel-play-overlay"><i class="fa-solid fa-play"></i></div>
                </div>
                <div class="reel-full fade-in">
                    <video loop muted playsinline preload="metadata" class="reel-vid">
                        <source src="assets/rainflow/Rainflow_tt_video_.mp4" type="video/mp4">
                    </video>
                    <div class="reel-play-overlay"><i class="fa-solid fa-play"></i></div>
                </div>
                <div class="reel-full reel-full-wide fade-in">
                    <video loop muted playsinline preload="metadata" class="reel-vid">
                        <source src="assets/garage/2023_prado_150.mov">
                    </video>
                    <div class="reel-play-overlay"><i class="fa-solid fa-play"></i></div>
                </div>
            </div>
        </section>

        <!-- ===== CONTACT ===== -->
        <section class="contact" id="contact">
            <div class="contact-inner">
                <p class="eyebrow fade-in">Get in touch</p>
                <h2 class="contact-headline fade-in">Let's create<br>something iconic.</h2>
                <div class="contact-btns fade-in">
                    <a href="mailto:charukax@gmail.com" class="btn-solid"><i class="fa-solid fa-envelope"></i> Email</a>
                    <a href="https://api.whatsapp.com/send?phone=94705887872" class="btn-ghost"><i class="fa-brands fa-whatsapp"></i> WhatsApp</a>
                    <a href="https://linkedin.com/in/charuka-silva" target="_blank" class="btn-ghost"><i class="fa-brands fa-linkedin"></i> LinkedIn</a>
                </div>
            </div>
            <footer class="footer">&copy; 2026 Charuka Silva</footer>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
